# Публикует статический сайт в ветку gh-pages (папка out/).
#
# ВАЖНО — иначе снова будет README:
# Settings → Pages → Build and deployment → Source: «Deploy from a branch»
#   Branch: gh-pages  /  Folder: / (root)
#
# Не используйте для сайта ветку main: в ней нет index.html в корне — GitHub покажет README.
#
# URL проекта: https://<владелец>.github.io/<имя-репозитория>/
# Репозиторий <владелец>.github.io → сайт в корне домена, base path задаётся шагом ниже.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Установка зависимостей
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Настроить base path для GitHub Pages
        run: |
          OWNER="${{ github.repository_owner }}"
          NAME="${{ github.event.repository.name }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            echo "NEXT_BASE_PATH=" >> "$GITHUB_ENV"
            echo "Режим: пользовательский сайт https://${OWNER}.github.io/"
          else
            echo "NEXT_BASE_PATH=/$NAME" >> "$GITHUB_ENV"
            echo "Режим: сайт проекта https://${OWNER}.github.io/${NAME}/"
          fi

      - name: Сборка статического сайта
        run: npm run build:github-pages
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Отключить Jekyll (чтобы не ломались пути с _)
        run: touch out/.nojekyll

      - name: Проверить артефакт сборки
        run: |
          test -f out/index.html || { echo "::error::Нет out/index.html — проверьте логи сборки"; exit 1; }
          echo "Файлов в out: $(find out -type f | wc -l)"

      - name: Залить в ветку gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
