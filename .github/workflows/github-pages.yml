# Сборка Next.js (статический экспорт) → папка docs/ на той же ветке (master/main).
# GitHub Pages: Settings → Source «Deploy from a branch» → ваша ветка (master) → Folder /docs
#
# Пуш только в docs/ не перезапускает workflow (paths-ignore), чтобы не было цикла.
#
# Примечание: в docs попадают сгенерированные файлы; «логика» приложения — в JS-чанках Next
# (_next/static/chunks/*.js). Минимальный HTML у страниц нужен браузеру как точка входа.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Установка зависимостей
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Настроить NEXT_BASE_PATH для GitHub Pages
        run: |
          OWNER="${{ github.repository_owner }}"
          NAME="${{ github.event.repository.name }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            echo "NEXT_BASE_PATH=" >> "$GITHUB_ENV"
            echo "Режим: https://${OWNER}.github.io/"
          else
            echo "NEXT_BASE_PATH=/$NAME" >> "$GITHUB_ENV"
            echo "Режим: https://${OWNER}.github.io/${NAME}/"
          fi

      - name: Сборка статического сайта
        run: npm run build:github-pages
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Проверить артефакт сборки
        run: |
          test -f out/index.html || { echo "::error::Нет out/index.html"; exit 1; }
          test -f out/.nojekyll || { echo "::error::Нет out/.nojekyll"; exit 1; }

      - name: Записать сборку в docs/ на ${{ github.ref_name }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: ${{ github.ref_name }}
          destination_dir: docs
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'chore(pages): обновить docs/ для GitHub Pages'
