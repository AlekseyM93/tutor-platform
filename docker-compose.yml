version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: tutor_platform_postgres
    environment:
      POSTGRES_DB: tutor_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: tutor_platform_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: tutor_platform_livekit
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - '7880:7880'
      - '7881:7881/udp'

volumes:
  postgres_data:
  minio_data:
